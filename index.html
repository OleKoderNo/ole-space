<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>OleSpace</title>

		<link rel="stylesheet" href="assets/css/olewind.css" />
		<script type="module" src="assets/js/olewind.js"></script>
		<script type="module" src="assets/js/index.js"></script>
	</head>

	<body ow="bg-off-white min-h-screen flex flex-col">
		<div id="navbar"></div>

		<main ow="flex flex-col items-center p-6 gap-6">
			<section
				id="search-section"
				ow="bg-white border rounded-md p-4 flex flex-col gap-4 max-w-hero w-full"
				style="box-sizing: border-box"
			>
				<h2 ow="text-large font-bold">Search posts</h2>

				<form id="search-form" ow="flex flex-col gap-4">
					<label for="search-input">Search by title, content, or username</label>

					<input id="search-input" name="search" type="search" placeholder="Search posts" />

					<button type="submit">Search</button>
				</form>

				<button id="clear-search-btn" type="button" class="hidden">Clear search</button>

				<p id="search-message" aria-live="polite"></p>
			</section>

			<section
				id="feed"
				aria-live="polite"
				ow="flex flex-col gap-4 max-w-hero w-full"
				style="box-sizing: border-box"
			></section>
		</main>
	</body>
</html>
