<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>OleSpace</title>

		<link rel="stylesheet" href="assets/css/olewind.css" />
		<script type="module" src="assets/js/olewind.js"></script>
		<script type="module" src="assets/js/index.js"></script>
	</head>

	<body ow="bg-off-white min-h-screen flex flex-col">
		<header ow="bg-white border-b p-4 flex justify-between items-center">
			<h1 ow="text-2xl font-bold">OleSpace</h1>

			<nav ow="flex gap-4">
				<a href="login.html" id="login-link">Login</a>
				<a href="register.html" id="register-link">Register</a>

				<a href="create.html" id="create-post-link" class="hidden">Create post</a>

				<a href="profile.html" id="profile-link" class="hidden">
					<button type="button">Profile</button>
				</a>

				<button id="logout-btn" class="hidden">Logout</button>
			</nav>
		</header>

		<main ow="flex flex-col items-center p-6 gap-6">
			<section ow="bg-white border rounded-md p-4 flex flex-col gap-4 max-w-hero w-full">
				<h2 ow="text-large font-bold">Search posts</h2>

				<form id="search-form" ow="flex flex-col gap-4">
					<label for="search-input">Search by title, content, or username</label>

					<input id="search-input" name="search" type="search" placeholder="Search posts" />

					<button type="submit">Search</button>
				</form>

				<button id="clear-search-btn" type="button" class="hidden">Clear search</button>

				<p id="search-message" aria-live="polite"></p>
			</section>

			<section id="feed" aria-live="polite" ow="flex flex-col gap-4 max-w-hero w-full"></section>
		</main>
	</body>
</html>
