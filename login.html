<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Login | OleSpace</title>

		<link rel="stylesheet" href="assets/css/olewind.css" />

		<script type="module" src="assets/js/olewind.js"></script>
		<script type="module" src="assets/js/pages/login.js"></script>
	</head>

	<body ow="bg-off-white min-h-screen flex flex-col">
		<div id="navbar"></div>

		<main ow="flex items-center justify-center p-6">
			<section ow="bg-white p-6 rounded-lg max-w-xs w-full border">
				<h1 ow="text-2xl mb-4">Login</h1>

				<form id="login-form" ow="flex flex-col gap-4">
					<label for="email">Email</label>
					<input id="email" name="email" type="email" required />

					<label for="password">Password</label>
					<input id="password" name="password" type="password" required />

					<button type="submit">Login</button>
				</form>

				<p id="login-error" aria-live="assertive"></p>
			</section>
		</main>
	</body>
</html>
