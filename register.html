<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Register | OleSpace</title>

		<link rel="stylesheet" href="assets/css/olewind.css" />

		<script type="module" src="assets/js/olewind.js"></script>
		<script type="module" src="assets/js/register.js"></script>
	</head>

	<body ow="bg-off-white min-h-screen flex items-center justify-center">
		<main ow="bg-white p-6 rounded-lg max-w-xs w-full border">
			<h1 ow="text-2xl mb-4">Register</h1>

			<form id="register-form" ow="flex flex-col gap-4">
				<label for="name">Username</label>
				<input id="name" name="name" required />

				<label for="email">Email</label>
				<input id="email" name="email" type="email" required />

				<label for="password">Password</label>
				<input id="password" name="password" type="password" required minlength="8" />

				<label for="confirm-password">Confirm password</label>
				<input
					id="confirm-password"
					name="confirm-password"
					type="password"
					required
					minlength="8"
				/>

				<button type="submit">Register</button>
			</form>

			<p id="register-error" aria-live="assertive"></p>
		</main>
	</body>
</html>
